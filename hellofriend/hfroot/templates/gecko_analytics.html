<!DOCTYPE html>
<html>
<head>
    <title>Gecko Energy Analytics</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1a1a1a;
            --muted: #666;
            --control-bg: #f5f5f5;
            --control-border: #ccc;
        }
        html[data-theme="dark"] {
            --bg: #121212;
            --fg: #e8e8e8;
            --muted: #9a9a9a;
            --control-bg: #1f1f1f;
            --control-border: #3a3a3a;
        }
        body {
            font-family: system-ui, sans-serif; margin: 2rem;
            background: var(--bg); color: var(--fg);
            transition: background 0.15s, color 0.15s;
        }
        .controls { margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .controls select, .controls input, .controls button {
            background: var(--control-bg); color: var(--fg);
            border: 1px solid var(--control-border);
            padding: 0.25rem 0.5rem; border-radius: 3px;
        }
        .controls button { cursor: pointer; }
        #chart { width: 100%; height: 40vh; min-height: 300px; }
        #chart.glow .scatterlayer .trace .js-line {
            filter: drop-shadow(0 0 1.5px currentColor);
        }
        @media (max-width: 600px) {
            body { margin: 1rem; }
        }
        #status { color: var(--muted); font-size: 0.9rem; }
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1rem; gap: 1rem;
        }
        #theme-toggle {
            background: transparent; border: 1px solid currentColor; color: inherit;
            padding: 0.2rem 0.6rem; border-radius: 3px; cursor: pointer; font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1 style="margin: 0;">Gecko Gameplay Analytics</h1>
        <button id="theme-toggle" type="button">Light mode</button>
    </div>
    <div class="controls">
        <label for="user-select">User:</label>
        <select id="user-select">
            <option value="">-- select a user --</option>
            {% for u in users %}
                <option value="{{ u.id }}">{{ u.username }} (id {{ u.id }})</option>
            {% endfor %}
        </select>

        <label for="range-select">Range:</label>
        <select id="range-select">
            <option value="1">Last 1 hour</option>
            <option value="24" selected>Last 24 hours</option>
            <option value="168">Last 7 days</option>
            <option value="720">Last 30 days</option>
            <option value="">All time</option>
        </select>

        <label style="display: flex; align-items: center; gap: 0.35rem;">
            <input id="grid-toggle" type="checkbox" /> Grid
        </label>

        <label style="display: flex; align-items: center; gap: 0.35rem;">
            <input id="curve-toggle" type="checkbox" checked /> Curved
        </label>

        <label style="display: flex; align-items: center; gap: 0.35rem;">
            <input id="variance-toggle" type="checkbox" checked /> Variance strip
        </label>

        <label style="display: flex; align-items: center; gap: 0.35rem;">
            <input id="trigger-label-toggle" type="checkbox" /> Trigger labels
        </label>

        <label style="display: flex; align-items: center; gap: 0.35rem;">
            <input id="windows-toggle" type="checkbox" checked /> Compute windows
        </label>

        <span id="status"></span>
    </div>
    <div class="controls" id="trigger-filter-row" style="font-size: 0.9rem;">
        <span style="color: var(--muted);">Filter triggers:</span>
        <label><input type="checkbox" class="trigger-filter" value="update_gecko_data" checked /> update_gecko_data</label>
        <label><input type="checkbox" class="trigger-filter" value="get_score_state" checked /> get_score_state</label>
        <label><input type="checkbox" class="trigger-filter" value="flush" checked /> flush</label>
        <label><input type="checkbox" class="trigger-filter" value="connect" checked /> connect</label>
    </div>
    <div id="chart"></div>

    <script>
        const select = document.getElementById('user-select');
        const chart = document.getElementById('chart');
        const status = document.getElementById('status');
        const themeToggle = document.getElementById('theme-toggle');
        const gridToggle = document.getElementById('grid-toggle');
        const curveToggle = document.getElementById('curve-toggle');
        const varianceToggle = document.getElementById('variance-toggle');
        const triggerLabelToggle = document.getElementById('trigger-label-toggle');
        const windowsToggle = document.getElementById('windows-toggle');
        const rangeSelect = document.getElementById('range-select');
        const triggerFilters = document.querySelectorAll('.trigger-filter');

        function activeTriggers() {
            return new Set(Array.from(triggerFilters).filter(cb => cb.checked).map(cb => cb.value));
        }

        const STORAGE_KEY = 'gecko-analytics-theme';
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? 'Light mode' : 'Dark mode';
            localStorage.setItem(STORAGE_KEY, theme);
            if (select.value) loadUser(select.value);
        }
        function currentTheme() {
            return document.documentElement.getAttribute('data-theme') || 'dark';
        }
        themeToggle.addEventListener('click', () => {
            applyTheme(currentTheme() === 'dark' ? 'light' : 'dark');
        });
        const savedTheme = localStorage.getItem(STORAGE_KEY) || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? 'Light mode' : 'Dark mode';

        async function loadUser(userId) {
            if (!userId) {
                Plotly.purge(chart);
                status.textContent = '';
                chart.style.height = '40vh';
                return;
            }
            status.textContent = 'loading…';

            let rows;
            try {
                const params = new URLSearchParams({ user_id: userId, nopaginate: 'true' });
                const hours = rangeSelect.value;
                if (hours) {
                    const since = new Date(Date.now() - parseInt(hours) * 3600 * 1000).toISOString();
                    params.set('since', since);
                }
                const res = await fetch(`/users/gecko/analytics/energy-sync/?${params.toString()}`);
                rows = await res.json();
            } catch (err) {
                status.textContent = 'error: ' + err.message;
                return;
            }

            const allowed = activeTriggers();
            rows = rows.filter(r => allowed.has(r.trigger));

            if (!rows.length) {
                status.textContent = 'no samples for this user';
                Plotly.purge(chart);
                return;
            }

            const x = rows.map(r => r.created_at);
            const serverY = rows.map(r => r.server_energy_after);
            const clientY = rows.map(r => r.client_energy);
            const triggers = rows.map(r => r.trigger);
            const diff = rows.map(r =>
                r.client_energy == null ? null : r.client_energy - r.server_energy_after
            );
            const absDiff = diff.map(v => v == null ? 0 : Math.abs(v));

            const isDark = currentTheme() === 'dark';
            const axisColor = isDark ? '#e8e8e8' : '#1a1a1a';
            const gridColor = isDark ? '#2a2a2a' : '#e5e5e5';
            const showGrid = gridToggle.checked;
            const curved = curveToggle.checked;
            const showVariance = varianceToggle.checked;
            const showWindows = windowsToggle.checked;
            const serverColor = isDark ? '#4dd0e1' : '#1f77b4';
            const clientColor = isDark ? '#ffb74d' : '#ff7f0e';
            const goodColor = isDark ? '#66bb6a' : '#388e3c';
            const midColor = isDark ? '#ffb74d' : '#f57c00';
            const badColor = isDark ? '#ef5350' : '#d32f2f';
            const lineShape = curved ? 'spline' : 'linear';
            const traceMode = curved ? 'lines' : 'lines+markers';

            let h = 40;
            if (showVariance) h += 4;
            if (showWindows) h += 18;
            chart.style.height = `${h}vh`;

            let varianceDomain = null, windowsDomain = null, mainDomain;
            let cursor = 0;
            if (showVariance) {
                varianceDomain = [cursor, cursor + 0.06];
                cursor = varianceDomain[1] + 0.04;
            }
            if (showWindows) {
                windowsDomain = [cursor, cursor + 0.28];
                cursor = windowsDomain[1] + 0.05;
            }
            mainDomain = [cursor, 1.0];

            const traces = [
                {
                    x, y: serverY,
                    name: 'server_energy_after',
                    type: 'scatter', mode: traceMode,
                    line: { color: serverColor, width: 2.5, shape: lineShape, smoothing: 1.1 },
                    marker: { size: 5, color: serverColor },
                    customdata: triggers,
                    hovertemplate: '%{x}<br>server: %{y:.3f}<br>trigger: %{customdata}<extra></extra>',
                    xaxis: 'x', yaxis: 'y',
                },
                {
                    x, y: clientY,
                    name: 'client_energy',
                    type: 'scatter', mode: traceMode,
                    line: { color: clientColor, width: 2.5, shape: lineShape, smoothing: 1.1 },
                    marker: { size: 5, color: clientColor },
                    connectgaps: false,
                    customdata: triggers,
                    hovertemplate: '%{x}<br>client: %{y:.3f}<br>trigger: %{customdata}<extra></extra>',
                    xaxis: 'x', yaxis: 'y',
                },
            ];

            if (showWindows) {
                const winAxisId = showVariance ? 'y3' : 'y2';

                const serverX = [];
                const serverYCat = [];
                const serverMeta = [];
                const clientX = [];
                const clientYCat = [];
                const clientMeta = [];
                rows.forEach(r => {
                    if (r.server_updated_at_before && r.server_updated_at_after) {
                        const sDur = new Date(r.server_updated_at_after).getTime()
                                   - new Date(r.server_updated_at_before).getTime();
                        const sMeta = [r.server_updated_at_before, r.server_updated_at_after, sDur];
                        serverX.push(r.server_updated_at_before, r.server_updated_at_after, null);
                        serverYCat.push('server', 'server', null);
                        serverMeta.push(sMeta, sMeta, null);
                    }
                    if (r.client_started_on && r.client_ended_on) {
                        const cDur = new Date(r.client_ended_on).getTime()
                                   - new Date(r.client_started_on).getTime();
                        const cMeta = [r.client_started_on, r.client_ended_on, cDur];
                        clientX.push(r.client_started_on, r.client_ended_on, null);
                        clientYCat.push('client', 'client', null);
                        clientMeta.push(cMeta, cMeta, null);
                    }
                });

                const edgeColor = isDark ? '#fff' : '#000';
                traces.push({
                    x: serverX, y: serverYCat,
                    type: 'scatter', mode: 'lines+markers',
                    line: { color: serverColor, width: 10 },
                    marker: { size: 8, color: serverColor, line: { color: edgeColor, width: 1.5 } },
                    connectgaps: false,
                    showlegend: false,
                    customdata: serverMeta,
                    hovertemplate: 'server window<br>start: %{customdata[0]}<br>end: %{customdata[1]}<br>duration: %{customdata[2]}ms<extra></extra>',
                    xaxis: 'x', yaxis: winAxisId,
                });
                traces.push({
                    x: clientX, y: clientYCat,
                    type: 'scatter', mode: 'lines+markers',
                    line: { color: clientColor, width: 10 },
                    marker: { size: 8, color: clientColor, line: { color: edgeColor, width: 1.5 } },
                    connectgaps: false,
                    showlegend: false,
                    customdata: clientMeta,
                    hovertemplate: 'client window<br>start: %{customdata[0]}<br>end: %{customdata[1]}<br>duration: %{customdata[2]}ms<extra></extra>',
                    xaxis: 'x', yaxis: winAxisId,
                });
            }

            if (showVariance) {
                traces.push({
                    x,
                    y: absDiff.map(() => 1),
                    type: 'bar',
                    showlegend: false,
                    marker: {
                        color: absDiff,
                        colorscale: [
                            [0.0, goodColor],
                            [0.03 / 1.05, goodColor],
                            [0.03 / 1.05, midColor],
                            [0.05 / 1.05, midColor],
                            [0.05 / 1.05, badColor],
                            [1.0, badColor],
                        ],
                        cmin: 0,
                        cmax: 1.05,
                        line: { width: 0 },
                    },
                    customdata: diff,
                    hovertemplate: '%{x}<br>Δ = %{customdata:+.3f}<extra></extra>',
                    xaxis: 'x', yaxis: 'y2',
                });
            }

            const xAnchor = showVariance ? 'y2' : (showWindows ? 'y2' : 'y');

            const layout = {
                xaxis: {
                    title: 'time', type: 'date', color: axisColor,
                    gridcolor: gridColor, showgrid: showGrid,
                    zeroline: false, showline: false,
                    domain: [0, 1],
                    anchor: xAnchor,
                },
                yaxis: {
                    title: 'energy', range: [0, 1.05], color: axisColor,
                    gridcolor: gridColor, showgrid: showGrid,
                    zeroline: false, showline: false,
                    domain: mainDomain,
                    anchor: 'x',
                },
                hovermode: 'x unified',
                bargap: 0,
                margin: { t: 20, r: 20 },
                paper_bgcolor: isDark ? '#121212' : '#ffffff',
                plot_bgcolor: isDark ? '#161616' : '#ffffff',
                font: { color: axisColor },
                legend: {
                    font: { color: axisColor },
                    title: { text: '<b>Energy Levels</b>', font: { color: axisColor, size: 22 } },
                    itemwidth: 30,
                    x: 1.02, y: 1, xanchor: 'left', yanchor: 'top',
                },
            };

            const annotations = [];

            if (triggerLabelToggle.checked) {
                const step = Math.max(1, Math.ceil(rows.length / 40));
                for (let i = 0; i < rows.length; i += step) {
                    annotations.push({
                        x: x[i],
                        y: serverY[i],
                        text: triggers[i],
                        showarrow: false,
                        textangle: -60,
                        yshift: 18,
                        xanchor: 'left',
                        font: { size: 9, color: axisColor },
                    });
                }
            }

            if (showVariance) {
                layout.yaxis2 = {
                    domain: varianceDomain,
                    fixedrange: true,
                    showgrid: false, zeroline: false, showline: false,
                    showticklabels: false, ticks: '',
                    anchor: 'x',
                };
                annotations.push(
                    {
                        text: '<b>Client Variance</b>',
                        x: 1.02, y: varianceDomain[1], xref: 'paper', yref: 'paper',
                        xanchor: 'left', yanchor: 'top',
                        showarrow: false,
                        font: { color: axisColor, size: 16 },
                    },
                    ...[
                        { color: goodColor, label: '|Δ| ≤ 0.03', offset: 0 },
                        { color: midColor, label: '0.03 < |Δ| ≤ 0.05', offset: 1 },
                        { color: badColor, label: '|Δ| > 0.05', offset: 2 },
                    ].map(({ color, label, offset }) => ({
                        text: `<span style="color:${color}">■</span> ${label}`,
                        x: 1.02, y: varianceDomain[1] - 0.04 - offset * 0.035,
                        xref: 'paper', yref: 'paper',
                        xanchor: 'left', yanchor: 'top',
                        showarrow: false,
                        font: { color: axisColor, size: 12 },
                        align: 'left',
                    }))
                );
            }

            if (showWindows) {
                const winAxis = showVariance ? 'yaxis3' : 'yaxis2';
                layout[winAxis] = {
                    domain: windowsDomain,
                    type: 'category',
                    categoryorder: 'array',
                    categoryarray: ['server', 'client'],
                    fixedrange: true,
                    showgrid: false, zeroline: false, showline: false,
                    tickfont: { color: axisColor, size: 10 },
                    ticks: '',
                    anchor: 'x',
                };
                const winLegendLines = [
                    { text: '<b>Compute Windows</b>', size: 16 },
                    { text: `<span style="color:${serverColor}">■</span> server_updated_at_before`, size: 11 },
                    { text: `<span style="color:${serverColor}">■</span> server_updated_at_after`, size: 11 },
                    { text: `<span style="color:${clientColor}">■</span> client_started_on`, size: 11 },
                    { text: `<span style="color:${clientColor}">■</span> client_ended_on`, size: 11 },
                ];

                const lineGap = 0.05;
                winLegendLines.forEach(({ text, size }, i) => {
                    annotations.push({
                        text,
                        x: 1.02, y: windowsDomain[1] - i * lineGap,
                        xref: 'paper', yref: 'paper',
                        xanchor: 'left', yanchor: 'top',
                        showarrow: false,
                        font: { color: axisColor, size },
                        align: 'left',
                    });
                });
            }

            layout.annotations = annotations;

            chart.classList.toggle('glow', isDark);
            Plotly.newPlot(chart, traces, layout, { responsive: true });
            status.textContent = `${rows.length} samples`;
        }

        select.addEventListener('change', (e) => loadUser(e.target.value));
        gridToggle.addEventListener('change', () => { if (select.value) loadUser(select.value); });
        curveToggle.addEventListener('change', () => { if (select.value) loadUser(select.value); });
        varianceToggle.addEventListener('change', () => { if (select.value) loadUser(select.value); });
        triggerLabelToggle.addEventListener('change', () => { if (select.value) loadUser(select.value); });
        windowsToggle.addEventListener('change', () => { if (select.value) loadUser(select.value); });
        rangeSelect.addEventListener('change', () => { if (select.value) loadUser(select.value); });
        triggerFilters.forEach(cb => cb.addEventListener('change', () => { if (select.value) loadUser(select.value); }));
    </script>
</body>
</html>
